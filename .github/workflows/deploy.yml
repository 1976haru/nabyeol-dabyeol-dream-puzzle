name: Deploy web game

on:
  push:
    branches: [main, web-migration]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-game/package-lock.json

      - name: Install dependencies
        working-directory: web-game
        run: npm ci

      - name: Run tests
        working-directory: web-game
        run: npm test

      - name: Build
        working-directory: web-game
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-game/dist
